services:
  - type: web
    name: hookah-menu
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_PUBLIC_APP_URL
        value: https://hookah-menu-8cqq.onrender.com
      - key: GOOGLE_SHEET_ID
        value: 1Fu330axX0aYehTS7mv9EopnzM_4THrxv2d-aR0NQL4o
      - key: GOOGLE_SHEET_GID
        value: 569579743
      - key: GOOGLE_SHEET_NAME
        value: Наличие табаков
      - key: GOOGLE_ACTIVE_MIXES_SHEET_NAME
        value: Активные миксы
      - key: GOOGLE_MIX_HISTORY_SHEET_NAME
        value: История заказов
      - key: GOOGLE_INVENTORY_MOVEMENT_SHEET_NAME
        value: Движение склада
      - key: PUBLIC_SITE_URL
        value: https://hookah-menu-8cqq.onrender.com
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
